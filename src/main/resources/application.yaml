server:
  port: 8080

spring:
  application:
    name: commodity-monitor

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/commodities_gh
    username: postgres
    password: ${DB_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:secretKeyForDevelopmentOnlyValueMustBeLongerThan256Bits}
  expiration: 86400000 # 24h in milliseconds

logging:
  level:
    root: INFO
    com.ghana.commoditymonitor: INFO

cors:
  allowed-origins: "*"

app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
    email: ${ADMIN_EMAIL:admin@commoditygh.com}
  mail:
    enabled: ${MAIL_ENABLED:false}
  frontend:
    base-url: ${FRONTEND_URL:http://localhost:5173}
