server:
  port: 8080

spring:
  application:
    name: commodity-monitor

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      max-lifetime: 600000        # 10 minutes — well under Render's idle timeout
      keepalive-time: 120000      # 2 minutes — keeps connections alive
      connection-timeout: 30000   # 30 seconds
      idle-timeout: 300000        # 5 minutes

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: a54ced001@smtp-brevo.com
    password: ${BREVO_SMTP_PASSWORD}
    test-connection: false
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

jwt:
  secret: ${JWT_SECRET:secretKeyForDevelopmentOnlyValueMustBeLongerThan256Bits}
  expiration: 86400000 # 24h in milliseconds

logging:
  level:
    root: INFO
    com.ghana.commoditymonitor: INFO

cors:
  allowed-origins: "*"

app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
    email: ${ADMIN_EMAIL:admin@commoditygh.com}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from-address: mawulegabriel@gmail.com
    from-name: CommodityGH
  reset-token:
    expiry-hours: 1
  seed:
    recompute-on-startup: true
  frontend:
    base-url: ${FRONTEND_URL:http://localhost:5173}
