server:
  port: 8080

spring:
  application:
    name: commodity-monitor

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/commodities_gh
    username: postgres
    password: ${DB_PASSWORD:masters123}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:secretKeyForDevelopmentOnlyValueMustBeLongerThan256Bits}
  expiration: 86400000 # 24h in milliseconds

logging:
  level:
    root: INFO
    com.ghana.commoditymonitor: INFO

cors:
  allowed-origins: "*"

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
    email: ${ADMIN_EMAIL:admin@commoditygh.com}
